name: Bug report
description: Something is broken or not behaving as expected.
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more specific you can be, the faster it gets fixed.
        **Do not paste real API keys or secrets.** If the bug involves a secret, use a fake one (e.g. `AKIAIOSFODNN7EXAMPLE`) or redact it.
  - type: input
    id: version
    attributes:
      label: Quell version
      description: Check the Extensions panel in VSCode, or run `code --list-extensions --show-versions | grep quell`.
      placeholder: "2.4.0"
    validations:
      required: true
  - type: input
    id: vscode
    attributes:
      label: VSCode / editor version
      description: Help > About. Include if you are on Cursor, Windsurf, AntiGravity, etc.
      placeholder: "VSCode 1.95.0 on Windows 11"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly. Include the exact string you pasted or typed if relevant (with any real secrets swapped for fakes).
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered list, ideally reproducible on a fresh project.
      placeholder: |
        1. Open a new file
        2. Paste the string `...`
        3. Run command `...`
        4. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Quell log output
      description: "Run `Quell: Show Quell Log` from the command palette and paste relevant lines here. Scrub any real secrets first."
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Pre-submit checklist
      options:
        - label: I have removed or replaced any real secrets in this report.
          required: true
        - label: I have searched existing issues and this is not a duplicate.
          required: true
