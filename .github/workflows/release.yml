name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npx vsce package --no-dependencies

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Quell v${{ steps.version.outputs.VERSION }}"
          body: |
            See [CHANGELOG.md](https://github.com/sonofg0tham/Quell/blob/main/CHANGELOG.md)
            for what's changed in this release.
          files: "quell-${{ steps.version.outputs.VERSION }}.vsix"
          draft: false
          prerelease: false
