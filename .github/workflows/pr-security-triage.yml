name: PR & Security Triage

on:
  schedule:
    - cron: '0 9 * * 1'
    - cron: '0 9 * * 5'
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  issues: write
  security-events: read

jobs:
  triage:
    name: AI Triage
    runs-on: ubuntu-latest
    if: |
      github.actor != 'github-actions[bot]' ||
      github.event_name == 'schedule'
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch triage script
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/Sonofg0tham/workflow-scripts/main/scripts/pr-security-triage.js \
            -o /tmp/pr-security-triage.js

      - name: Run triage
        env:
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_NUMBER:      ${{ github.event.pull_request.number }}
        run: node /tmp/pr-security-triage.js